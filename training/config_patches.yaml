project: lyman-alpha-bubble-size
entity: null
seed: 42

data:
  input_csv: training/data/bubble_size_dataset_patches.csv
  target_column: target_peak_radius_mpc_h
  val_fraction: 0.2
  split_mode: group
  group_column: snapshot

model:
  type: random_forest
  n_estimators: 700
  max_depth: 20
  min_samples_split: 2
  min_samples_leaf: 1
  n_jobs: -1

output:
  model_dir: training/artifacts_patches
  model_name: rf_bubble_size_patches.joblib

wandb:
  enabled: true
  run_name: rf_patches_baseline

